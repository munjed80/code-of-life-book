name: Build novel print editions

on:
  push:
    branches:
      - revise-novel-deeper-reflections
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build TXT and HTML editions
        run: python3 tools/build_novel.py

      - name: Commit generated editions
        run: |
          if git diff --quiet -- novel/print/novel-print.txt novel/print/novel-ebook.html; then
            echo "Print editions are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add novel/print/novel-print.txt novel/print/novel-ebook.html
          git commit -m "Rebuild novel TXT and HTML editions"
          git push
