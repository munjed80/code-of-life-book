name: بناء نسخ النشر

on:
  push:
    branches: ["main", "master"]
    paths:
      - "chapters/**"
      - "tools/build_publish.py"
      - "tools/requirements.txt"
  pull_request:
    paths:
      - "chapters/**"
      - "tools/build_publish.py"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4

      - name: إعداد Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: tools/requirements.txt

      - name: تثبيت متطلبات Python
        run: pip install -r tools/requirements.txt

      - name: تثبيت متطلبات WeasyPrint النظاميّة
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libpangocairo-1.0-0 \
            libcairo2 libffi-dev fonts-noto-core fonts-noto-extra

      - name: بناء نسخ النشر
        run: python3 tools/build_publish.py

      - name: التحقق من المُخرجات
        run: |
          for f in publish/book-print.txt publish/book-ebook.html \
                   publish/book-print.pdf publish/book.docx publish/book.epub; do
            if [ -f "$f" ]; then
              echo "✓ $f ($(du -h "$f" | cut -f1))"
            else
              echo "✗ $f — مفقود" && exit 1
            fi
          done

      - name: رفع المُخرجات كـ artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ github.sha }}
          path: |
            publish/book-print.txt
            publish/book-ebook.html
            publish/book-print.pdf
            publish/book.docx
            publish/book.epub
          retention-days: 90

      - name: حفظ المُخرجات في المستودع (فرع رئيسيّ فقط)
        if: >
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add publish/book-print.txt publish/book-ebook.html \
                  publish/book-print.pdf publish/book.docx publish/book.epub \
                  publish/book-final.md || true
          git diff --cached --quiet || \
            git commit -m "chore: تحديث نسخ النشر [skip ci]" && git push
